databaseChangeLog:
  - changeSet:
      id: 01-create-roles-table
      author: literandltx
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: is_deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: 01-1-insert-default-roles
      author: literandltx
      changes:
        - insert:
            tableName: roles
            columns:
              - column:
                  name: name
                  value: "ADMIN"
        - insert:
            tableName: roles
            columns:
              - column:
                  name: name
                  value: "USER"
